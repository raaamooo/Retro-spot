[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build && npx prisma migrate deploy && npm run prisma:seed"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
watchPatterns = ["backend/**", "prisma/**"]
