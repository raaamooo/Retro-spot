services:
  # ── Backend Service ────────────────────────────────────────────────
  - type: web
    name: retro-spot-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retro-spot-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        # This will be the URL of your frontend service
        # You may need to update this after the first deployment
        value: https://retro-spot-frontend.onrender.com

    # NOTE: Disks are not available on the Free plan. 
    # If you upgrade to a paid plan, uncomment the lines below to persist uploads.
    # disk:
    #   name: retro-spot-uploads
    #   mountPath: /opt/render/project/src/backend/public/uploads
    #   sizeGB: 1

  # ── Frontend Service ───────────────────────────────────────────────
  - type: web
    name: retro-spot-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://retro-spot-backend.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://retro-spot-backend.onrender.com
      - key: NODE_ENV
        value: production

databases:
  # ── PostgreSQL Database ────────────────────────────────────────────
  - name: retro-spot-db
    plan: free
